<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisa Culturama</title>

    <style>
        body {
            font-family: Arial, sans-serif;
        }

        fieldset {
            margin-bottom: 20px;
            padding: 15px;
            border: 2px solid #ccc;
            border-radius: 8px;
        }

        legend {
            font-weight: bold;
        }

        label {
            display: inline-block;
            margin-top: 8px;
        }
    </style>
</head>

<body>

<header>
    <h1>Pesquisa Online</h1>
</header>

<section>
<form action="" method="get">

    <!-- DADOS PESSOAIS -->
    <fieldset>
        <legend>Dados Pessoais</legend>

        <label for="UserName">Nome do Usuário:</label>
        <input type="text" id="UserName" required><br>

        <label for="Age">Idade:</label>
        <input type="number" id="Age" min="12" max="100" required><br>

        <label for="Birthdate">Data de Nascimento:</label>
        <input type="date" id="Birthdate"><br>

        <label for="UserEmail">E-mail:</label>
        <input type="email" id="UserEmail" required><br>

        <label for="UserPhoneNumber">Telefone:</label>
        <input type="tel" id="UserPhoneNumber" placeholder="XX-XXXXX-XXXX"><br>

        <label for="UserImage">Foto:</label>
        <input type="file" id="UserImage" accept="image/*">
    </fieldset>

    <!-- PERFIL -->
    <fieldset>
        <legend>Perfil</legend>

        <p>Gênero:</p>
        <input type="radio" name="gender" id="male">
        <label for="male">Masculino</label>

        <input type="radio" name="gender" id="female">
        <label for="female">Feminino</label>

        <input type="radio" name="gender" id="other">
        <label for="other">Outro</label>
        <br><br>

        <label for="maritalstatus">Estado Civil:</label>
        <select id="maritalstatus">
            <option>Selecione o estado civil</option>
            <option>Solteiro(a)</option>
            <option>Casado(a)</option>
            <option>Divorciado(a)</option>
            <option>Viúvo(a)</option>
        </select>
        <br><br>

        <label for="state">Estado:</label>
        <select id="state">
            <option>Acre (AC)</option>
            <option>São Paulo (SP)</option>
            <option>Rio de Janeiro (RJ)</option>
        </select>
        <br>

        <label for="city">Cidade:</label>
        <input type="text" id="city" placeholder="Cidade">
    </fieldset>

    <!-- HÁBITOS -->
    <fieldset>
        <legend>Hábitos</legend>

        <p>Redes Sociais:</p>

        <input type="checkbox" id="instagram">
        <label for="instagram">Instagram</label><br>

        <input type="checkbox" id="facebook">
        <label for="facebook">Facebook</label><br>

        <input type="checkbox" id="twitter">
        <label for="twitter">Twitter</label><br><br>

        <label for="musicStyle">Estilo musical:</label>
        <input list="styleTypes" id="musicStyle">

        <datalist id="styleTypes">
            <option value="Rock">
            <option value="Pop">
            <option value="Samba">
            <option value="Sertanejo">
        </datalist>
        <br>

        <label for="favoriteColor">Cor favorita:</label>
        <input type="color" id="favoriteColor">
    </fieldset>

    <!-- OPINIÃO -->
    <fieldset>
        <legend>Opinião</legend>

        <p>Satisfação:</p>

        <input type="radio" name="satisfaction" id="verySatisfied">
        <label for="verySatisfied">Muito Satisfeito</label>

        <input type="radio" name="satisfaction" id="satisfied">
        <label for="satisfied">Satisfeito</label>

        <input type="radio" name="satisfaction" id="neutral">
        <label for="neutral">Neutro</label>

        <input type="radio" name="satisfaction" id="unsatisfied">
        <label for="unsatisfied">Insatisfeito</label>

        <br><br>

        <p>Opinião Livre:</p>
        <textarea rows="4" cols="50"></textarea>
    </fieldset>

    <!-- CONFIRMAÇÃO -->
    <fieldset>
        <legend>Confirmação</legend>

        <input type="checkbox" id="terms" required>
        <label for="terms">Eu aceito participar dessa pesquisa</label>
    </fieldset>

    <button type="submit">Enviar</button>

</form>
</section>

</body>
</html>
